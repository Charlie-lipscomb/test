<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 SUPER SNAKE 🐍</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: none;
        }
        .game-container {
            text-align: center;
        }
        canvas {
            border: 4px solid #00ff00;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            background: #000;
            touch-action: none;
        }
        h1 {
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }
        .score {
            font-size: 24px;
            margin: 10px 0;
        }
        .controls {
            margin-top: 15px;
            font-size: 18px;
        }
        button {
            margin: 5px;
            padding: 12px 24px;
            font-size: 18px;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background: #00cc00;
        }
        .touch-controls {
            margin: 15px 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .touch-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid #00ff00;
            color: white;
            padding: 20px;
            font-size: 18px;
            border-radius: 8px;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 SUPER SNAKE 🐍</h1>
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div class="controls">
            <p>Use ARROW KEYS / WASD or swipe on mobile</p>
            <button onclick="startGame()">Start / Restart</button>
        </div>

        <div class="touch-controls">
            <div></div>
            <div class="touch-btn" onclick="changeDirection(0, -1)">↑</div>
            <div></div>
            <div class="touch-btn" onclick="changeDirection(-1, 0)">←</div>
            <div></div>
            <div class="touch-btn" onclick="changeDirection(1, 0)">→</div>
            <div></div>
            <div class="touch-btn" onclick="changeDirection(0, 1)">↓</div>
            <div></div>
        </div>

        <p>High Score: <span id="highScore">0</span></p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameSpeed = 100;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.textContent = highScore;

        let touchStartX = 0;
        let touchStartY = 0;

        function randomFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        function drawGame() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                randomFood();
                if (gameSpeed > 50) gameSpeed -= 2;
            } else {
                snake.pop();
            }

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff00';
            for (let segment of snake) {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            }

            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function gameOver() {
            clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            alert(`Game Over! Your score: ${score}\nHigh Score: ${highScore}`);
        }

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            gameSpeed = 100;
            randomFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(drawGame, gameSpeed);
        }

        function changeDirection(newDx, newDy) {
            if (newDx === -dx && newDy === -dy) return;
            dx = newDx;
            dy = newDy;
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    if (dy !== 1) changeDirection(0, -1);
                    break;
                case 'ArrowDown': case 's': case 'S':
                    if (dy !== -1) changeDirection(0, 1);
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    if (dx !== 1) changeDirection(-1, 0);
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    if (dx !== -1) changeDirection(1, 0);
                    break;
            }
        });

        // Touch swipe controls
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        canvas.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > 40) {
                if (deltaX > 0) changeDirection(1, 0);
                else changeDirection(-1, 0);
            } else if (Math.abs(deltaY) > 40) {
                if (deltaY > 0) changeDirection(0, 1);
                else changeDirection(0, -1);
            }
        }, false);

        // Initial food
        randomFood();
    </script>
</body>
</html>
